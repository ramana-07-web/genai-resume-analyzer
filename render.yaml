services:
  - type: web
    name: resumeiq
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AFFINDA_API_KEY
        sync: false
      - key: AFFINDA_WORKSPACE
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3
